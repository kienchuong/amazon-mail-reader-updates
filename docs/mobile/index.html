<body><main id="root"><div class="app">Äang táº£i dashboard...</div></main>
<script>
(()=>{const root=document.querySelector('#root'),icons={Security:'ðŸ›¡',Reject:'âŠ˜',Payment:'â–£',Update:'â†»',Amazon:'amazon',General:'âœ‰'};let data={messages:[],payments:[],meta:{}},tab='inbox',filter='All',query='';const cfg=new URLSearchParams(location.hash.slice(1)),api=cfg.get('api'),token=cfg.get('t');const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const date=v=>{const m=String(v||'').match(/^(\d{4})-(\d{2})-(\d{2})/);return m?m[3]+'/'+m[2]:String(v||'')};const money=m=>m.amount===''||m.amount==null?'':esc(m.currency)+' '+Number(m.amount).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});function shell(){const sync=data.meta?.synced_at?new Date(data.meta.synced_at).toLocaleString():'ChÆ°a cÃ³ dá»¯ liá»‡u';root.innerHTML='<div class="app"><div class="top"><div><div class="brand">Amazon Mail Reader</div><div class="sync">Äá»“ng bá»™ '+esc(sync)+' Â· '+esc(data.meta?.range_days||7)+' ngÃ y</div></div><div class="amazon">amazon</div></div><div id="page"></div></div><nav class="nav"><button id="inbox" class="'+(tab==='inbox'?'active':'')+'">âœ‰ Inbox</button><button id="payment" class="'+(tab==='payment'?'active':'')+'">â–£ Payment</button></nav><div id="modal" class="modal"></div>';document.querySelector('#inbox').onclick=()=>{tab='inbox';shell()};document.querySelector('#payment').onclick=()=>{tab='payment';shell()};tab==='inbox'?inbox():payments()}function inbox(){const page=document.querySelector('#page'),cats=['All','Security','Reject','Update','Amazon','Payment'];page.innerHTML='<input class="search" id="search" placeholder="TÃ¬m kiáº¿m mail"><div class="filters">'+cats.map(c=>'<button data-c="'+c+'" class="'+(filter===c?'active':'')+'">'+(c==='All'?'Táº¥t cáº£':c)+'</button>').join('')+'</div><div id="list" class="list"></div>';const input=document.querySelector('#search');input.value=query;input.oninput=()=>{query=input.value;paint()};page.querySelectorAll('[data-c]').forEach(b=>b.onclick=()=>{filter=b.dataset.c;inbox()});paint()}function paint(){const rows=data.messages.filter(m=>(filter==='All'||m.category===filter)&&[m.account_name,m.subject,m.from_addr,m.snippet].join(' ').toLowerCase().includes(query.toLowerCase())),list=document.querySelector('#list');list.innerHTML=rows.length?rows.map((m,i)=>'<button class="mail" data-i="'+i+'"><span class="icon '+esc(m.category)+'">'+(m.category==='Amazon'?'<span class="amazon">amazon</span>':icons[m.category]||icons.General)+'</span><span><span class="pill '+esc(m.category)+'">'+esc(m.category)+'</span><div class="subject">'+esc(m.account_name)+' Â· '+esc(m.subject||'(KhÃ´ng cÃ³ tiÃªu Ä‘á»)')+'</div><div class="meta">'+esc(m.from_addr)+'</div></span><span class="right">'+(m.amount!==''&&m.amount!=null?'<div class="money">'+money(m)+'</div>':'')+'<div class="meta">'+date(m.mail_date)+'</div></span></button>').join(''):'<div class="empty">KhÃ´ng cÃ³ mail trong má»‘c Ä‘ang Ä‘á»“ng bá»™.</div>';list.querySelectorAll('[data-i]').forEach(b=>b.onclick=()=>openMail(rows[Number(b.dataset.i)]))}function openMail(m){const modal=document.querySelector('#modal'),body=m.body_status==='error'?'[KhÃ´ng táº£i Ä‘Æ°á»£c ná»™i dung: '+esc(m.body_error)+']':esc(m.body||'[KhÃ´ng cÃ³ ná»™i dung text]');modal.innerHTML='<section class="sheet"><button class="close">ÄÃ³ng</button><h2>'+esc(m.subject)+'</h2><div class="meta">'+esc(m.account_name)+' Â· '+esc(m.from_addr)+' Â· '+date(m.mail_date)+'</div><hr><div>'+body+'</div></section>';modal.classList.add('open');modal.querySelector('.close').onclick=()=>modal.classList.remove('open')}function payments(){const totals={};data.payments.forEach(p=>{if(p.currency&&p.amount!==''&&p.amount!=null)totals[p.currency]=(totals[p.currency]||0)+Number(p.amount)});document.querySelector('#page').innerHTML='<div>'+Object.entries(totals).map(([c,a])=>'<span class="sum">'+esc(c)+': '+a.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})+'</span>').join('')+'</div>'+data.payments.map(p=>'<div class="payment"><span class="meta">'+date(p.mail_date)+'</span><span><b>'+esc(p.account_name)+'</b><div class="meta">'+esc(p.account_email)+'</div><div class="meta">ID: '+esc(p.payment_id)+'</div></span><b class="money">'+money(p)+'</b></div>').join('')}if(!api||!token){root.innerHTML='<div class="app empty">Thiáº¿u cáº¥u hÃ¬nh link dashboard.</div>';return}fetch(api+'?action=snapshot&t='+encodeURIComponent(token)).then(r=>r.ok?r.json():Promise.reject()).then(v=>{data=v;shell()}).catch(()=>root.innerHTML='<div class="app empty">KhÃ´ng táº£i Ä‘Æ°á»£c dashboard.</div>')})();
</script></body></html>
