<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17191c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Amazon Mail Reader</title>
  <style>
    :root{color-scheme:dark;--bg:#181a1d;--surface:#22252a;--surface2:#2a2e34;--line:#363b42;--text:#f5f7fa;--muted:#9ba4ae;--blue:#4da3ff;--green:#62d889;--red:#ff7373;--orange:#f7a94b}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:15px "Segoe UI Variable","Segoe UI",system-ui,sans-serif}.app{max-width:760px;margin:auto;padding:20px 16px 96px}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;padding:4px 0 20px;border-bottom:1px solid var(--line)}.brand{font-size:22px;font-weight:700;letter-spacing:0}.brand small{display:block;color:var(--muted);font-size:13px;font-weight:400;margin-top:6px}.amazon{font-size:17px;font-weight:800;color:#fff;border-bottom:2px solid #ff9900;padding-bottom:1px}.sync,.meta{color:var(--muted);font-size:12px;line-height:1.45}.sync{margin-top:7px}.search{width:100%;margin:18px 0 11px;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:13px 14px;color:var(--text);font:inherit;outline:0}.search:focus{border-color:var(--blue);box-shadow:0 0 0 2px #2586d733}.filters{display:flex;gap:7px;overflow:auto;padding:2px 0 15px}.filters button,.nav button{font:inherit;border:1px solid var(--line);border-radius:8px;padding:8px 11px;background:transparent;color:var(--text);white-space:nowrap}.filters .active{background:#29496a;border-color:#3b7eb7}.list-title{display:flex;justify-content:space-between;color:var(--muted);font-size:12px;margin:2px 1px 9px}.list{display:grid;gap:9px}.mail{width:100%;text-align:left;background:var(--surface);border:1px solid transparent;border-radius:8px;padding:13px;color:var(--text);display:grid;grid-template-columns:42px minmax(0,1fr) auto;gap:11px;align-items:start}.mail:active{background:var(--surface2);border-color:var(--line)}.icon{width:42px;height:42px;display:grid;place-items:center;background:#31363d;border-radius:8px;font-size:15px;font-weight:700}.icon.Security{background:#542d32;color:#ff9a9a}.icon.Reject{font-size:0;background:#4e2d2f;border:1px solid #ff7676;position:relative}.icon.Reject:after{content:"";width:26px;height:2px;background:#ff8787;transform:rotate(-45deg)}.icon.Payment{background:#234634;color:#79e8a1}.icon.Update{background:#4d3b26;color:#ffc36f}.icon.Amazon{font-size:10px;background:#283b4c;color:#9bd2ff}.pill{display:inline-flex;align-items:center;min-height:19px;color:var(--muted);font-size:11px;margin-bottom:4px}.pill.Security{color:#ff9a9a}.pill.Reject{color:#ff9696}.pill.Payment{color:#79e8a1}.pill.Update{color:#ffc36f}.pill.Amazon{color:#9bd2ff}.subject{font-weight:600;line-height:1.38;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}.right{text-align:right;min-width:58px}.money{color:var(--green);font-weight:700;font-size:13px;white-space:nowrap}.empty{color:var(--muted);padding:56px 16px;text-align:center}.nav{position:fixed;bottom:0;left:0;right:0;padding:10px 16px calc(10px + env(safe-area-inset-bottom));background:#202328f7;border-top:1px solid var(--line);display:flex;justify-content:center;gap:10px;backdrop-filter:blur(14px)}.nav button{border:0;background:transparent;color:var(--muted);min-width:128px;padding:10px 16px}.nav .active{background:#2b4c6c;color:#fff}.summary-label{color:var(--muted);font-size:12px;margin-top:19px}.sum{display:inline-block;background:#234634;color:#79e8a1;border-radius:8px;padding:7px 10px;margin:9px 7px 13px 0;font-size:13px;font-weight:600}.payment{display:grid;grid-template-columns:48px minmax(0,1fr) auto;gap:12px;padding:14px;background:var(--surface);border-radius:8px;margin-bottom:9px}.payment .date{color:var(--muted);font-size:13px;padding-top:2px}.payment .account{font-weight:650}.payment .amount{text-align:right;color:var(--green);font-size:15px;white-space:nowrap}.modal{position:fixed;inset:0;background:#000a;display:none;align-items:flex-end}.modal.open{display:flex}.sheet{width:min(760px,100%);max-height:88vh;overflow:auto;background:var(--surface);padding:20px 18px calc(24px + env(safe-area-inset-bottom));border-radius:16px 16px 0 0;white-space:pre-wrap;line-height:1.55}.close{float:right;background:#343b43;color:#fff;border:0;border-radius:8px;padding:8px 12px;font:inherit}.sheet h2{font-size:18px;line-height:1.35;padding-right:60px}.sheet hr{border:0;border-top:1px solid var(--line);margin:16px 0}
  </style>
</head>
<body>
  <main id="root"><div class="app">Loading dashboard...</div></main>
  <script>
  (() => {
    const root = document.querySelector('#root');
    const icons = {Security:'S', Reject:'!', Payment:'$', Update:'U', Amazon:'amazon', General:'@'};
    let data = {messages:[], payments:[], meta:{}}, tab = 'inbox', filter = 'All', query = '';
    const cfg = new URLSearchParams(location.hash.slice(1));
    const api = cfg.get('api'), token = cfg.get('t');
    const esc = value => String(value ?? '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
    const date = value => { const match = String(value || '').match(/^(\d{4})-(\d{2})-(\d{2})/); return match ? match[3] + '/' + match[2] : String(value || ''); };
    const money = row => row.amount === '' || row.amount == null ? '' : esc(row.currency) + ' ' + Number(row.amount).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});

    function shell() {
      const sync = data.meta && data.meta.synced_at ? new Date(data.meta.synced_at).toLocaleString() : 'No data';
      const rangeDays = (data.meta || {}).range_days || 7;
      root.innerHTML = '<div class="app"><div class="top"><div><div class="brand">Amazon Mail Reader<small>Mail overview</small></div><div class="sync">Synced ' + esc(sync) + ' | ' + esc(rangeDays) + ' days</div></div><div class="amazon">amazon</div></div><div id="page"></div></div><nav class="nav"><button id="inbox" class="' + (tab === 'inbox' ? 'active' : '') + '">Inbox</button><button id="payment" class="' + (tab === 'payment' ? 'active' : '') + '">Payments</button></nav><div id="modal" class="modal"></div>';
      document.querySelector('#inbox').onclick = () => { tab = 'inbox'; shell(); };
      document.querySelector('#payment').onclick = () => { tab = 'payment'; shell(); };
      tab === 'inbox' ? inbox() : payments();
    }

    function inbox() {
      const page = document.querySelector('#page'), categories = ['All','Security','Reject','Update','Amazon','Payment'];
      page.innerHTML = '<input class="search" id="search" placeholder="Search mail"><div class="filters">' + categories.map(category => '<button data-category="' + category + '" class="' + (filter === category ? 'active' : '') + '">' + category + '</button>').join('') + '</div><div class="list-title"><span>Messages</span><span id="result-count"></span></div><div id="list" class="list"></div>';
      const input = document.querySelector('#search'); input.value = query; input.oninput = () => { query = input.value; paint(); };
      page.querySelectorAll('[data-category]').forEach(button => button.onclick = () => { filter = button.dataset.category; inbox(); });
      paint();
    }

    function paint() {
      const rows = data.messages.filter(message => (filter === 'All' || message.category === filter) && [message.account_name,message.subject,message.from_addr,message.snippet].join(' ').toLowerCase().includes(query.toLowerCase()));
      const list = document.querySelector('#list');
      document.querySelector('#result-count').textContent = rows.length + ' mail';
      list.innerHTML = rows.length ? rows.map((message, index) => '<button class="mail" data-index="' + index + '"><span class="icon ' + esc(message.category) + '">' + (message.category === 'Amazon' ? '<span class="amazon">amazon</span>' : (icons[message.category] || icons.General)) + '</span><span><span class="pill ' + esc(message.category) + '">' + esc(message.category) + '</span><div class="subject">' + esc(message.account_name) + ' | ' + esc(message.subject || '(No subject)') + '</div><div class="meta">' + esc(message.from_addr) + '</div></span><span class="right">' + (message.amount !== '' && message.amount != null ? '<div class="money">' + money(message) + '</div>' : '') + '<div class="meta">' + date(message.mail_date) + '</div></span></button>').join('') : '<div class="empty">No mail in the current sync range.</div>';
      list.querySelectorAll('[data-index]').forEach(button => button.onclick = () => openMail(rows[Number(button.dataset.index)]));
    }

    function openMail(message) {
      const modal = document.querySelector('#modal');
      const body = message.body_status === 'error' ? '[Body unavailable: ' + esc(message.body_error) + ']' : esc(message.body || '[No text body]');
      modal.innerHTML = '<section class="sheet"><button class="close">Close</button><h2>' + esc(message.subject) + '</h2><div class="meta">' + esc(message.account_name) + ' | ' + esc(message.from_addr) + ' | ' + date(message.mail_date) + '</div><hr><div>' + body + '</div></section>';
      modal.classList.add('open'); modal.querySelector('.close').onclick = () => modal.classList.remove('open');
    }

    function payments() {
      const totals = {};
      data.payments.forEach(payment => { if (payment.currency && payment.amount !== '' && payment.amount != null) totals[payment.currency] = (totals[payment.currency] || 0) + Number(payment.amount); });
      document.querySelector('#page').innerHTML = '<div class="summary-label">Payment summary</div><div>' + Object.entries(totals).map(([currency, amount]) => '<span class="sum">' + esc(currency) + ': ' + amount.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}) + '</span>').join('') + '</div><div class="list-title"><span>Payments</span><span>' + data.payments.length + ' records</span></div>' + data.payments.map(payment => '<div class="payment"><span class="date">' + date(payment.mail_date) + '</span><span><div class="account">' + esc(payment.account_name) + '</div><div class="meta">' + esc(payment.account_email) + '</div><div class="meta">Payment ID ' + esc(payment.payment_id) + '</div></span><b class="amount">' + money(payment) + '</b></div>').join('');
    }

    if (!api || !token) { root.innerHTML = '<div class="app empty">Dashboard link is not configured.</div>'; return; }
    fetch(api + '?action=snapshot&t=' + encodeURIComponent(token))
      .then(async response => {
        if (!response.ok) throw new Error('HTTP ' + response.status);
        return response.json();
      })
      .then(value => { data = value; shell(); })
      .catch(error => root.innerHTML = '<div class="app empty">Unable to load dashboard. ' + esc(error.message) + '</div>');
  })();
  </script>
</body>
</html>
