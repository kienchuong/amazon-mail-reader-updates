<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17191c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Amazon Mail Reader</title>
  <style>
    :root{color-scheme:dark;--bg:#17191c;--card:#202428;--card2:#292e34;--line:#3a4148;--text:#f4f7fa;--muted:#a8b0ba;--blue:#2586d7;--green:#71e895;--red:#ff8787;--orange:#ffc46b}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:15px "Segoe UI",system-ui,sans-serif}.app{max-width:760px;margin:auto;padding:18px 14px 86px}.top{display:flex;justify-content:space-between;align-items:start;gap:12px}.brand{font-size:23px;font-weight:700}.amazon{font-size:17px;font-weight:800;border-bottom:2px solid #ff9900}.sync,.meta{color:var(--muted);font-size:13px;margin-top:6px}.search{width:100%;margin:18px 0 10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;color:var(--text);font:inherit}.filters{display:flex;gap:7px;overflow:auto;padding-bottom:12px}.filters button,.nav button{border:1px solid var(--line);border-radius:10px;padding:8px 11px;background:transparent;color:var(--text);white-space:nowrap}.filters .active,.nav .active{background:var(--blue);border-color:var(--blue)}.list{display:grid;gap:9px}.mail{width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px;color:var(--text);display:grid;grid-template-columns:40px 1fr auto;gap:10px}.icon{width:40px;height:40px;display:grid;place-items:center;background:#30363d;border-radius:12px;font-size:16px;font-weight:700}.Security{color:var(--red)}.Reject{color:var(--orange)}.Payment{color:var(--green)}.Update{color:var(--orange)}.Amazon{color:#82c2ff}.subject{font-weight:600;line-height:1.35}.pill{display:inline-block;font-size:12px;margin-bottom:4px}.right{text-align:right}.money{color:var(--green);font-weight:700}.empty{color:var(--muted);padding:40px 12px;text-align:center}.nav{position:fixed;bottom:0;left:0;right:0;padding:10px;background:#202428f5;border-top:1px solid var(--line);display:flex;justify-content:center;gap:8px}.nav button{min-width:125px}.sum{display:inline-block;background:#1c492a;color:var(--green);border-radius:9px;padding:7px 10px;margin:16px 6px 12px 0}.payment{display:grid;grid-template-columns:54px 1fr auto;gap:10px;padding:12px;background:var(--card);border-bottom:1px solid var(--line)}.modal{position:fixed;inset:0;background:#000a;display:none;align-items:end}.modal.open{display:flex}.sheet{width:min(760px,100%);max-height:88vh;overflow:auto;background:var(--card);padding:18px;border-radius:18px 18px 0 0;white-space:pre-wrap;line-height:1.5}.close{float:right;background:#343b43;color:#fff;border:0;border-radius:8px;padding:7px 10px}
  </style>
</head>
<body>
  <main id="root"><div class="app">Loading dashboard...</div></main>
  <script>
  (() => {
    const root = document.querySelector('#root');
    const icons = {Security:'S', Reject:'!', Payment:'$', Update:'U', Amazon:'amazon', General:'@'};
    let data = {messages:[], payments:[], meta:{}}, tab = 'inbox', filter = 'All', query = '';
    const cfg = new URLSearchParams(location.hash.slice(1));
    const api = cfg.get('api'), token = cfg.get('t');
    const esc = value => String(value ?? '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
    const date = value => { const match = String(value || '').match(/^(\d{4})-(\d{2})-(\d{2})/); return match ? match[3] + '/' + match[2] : String(value || ''); };
    const money = row => row.amount === '' || row.amount == null ? '' : esc(row.currency) + ' ' + Number(row.amount).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});

    function shell() {
      const sync = data.meta && data.meta.synced_at ? new Date(data.meta.synced_at).toLocaleString() : 'No data';
      const rangeDays = (data.meta || {}).range_days || 7;
      root.innerHTML = '<div class="app"><div class="top"><div><div class="brand">Amazon Mail Reader</div><div class="sync">Synced ' + esc(sync) + ' | ' + esc(rangeDays) + ' days</div></div><div class="amazon">amazon</div></div><div id="page"></div></div><nav class="nav"><button id="inbox" class="' + (tab === 'inbox' ? 'active' : '') + '">Inbox</button><button id="payment" class="' + (tab === 'payment' ? 'active' : '') + '">Payment</button></nav><div id="modal" class="modal"></div>';
      document.querySelector('#inbox').onclick = () => { tab = 'inbox'; shell(); };
      document.querySelector('#payment').onclick = () => { tab = 'payment'; shell(); };
      tab === 'inbox' ? inbox() : payments();
    }

    function inbox() {
      const page = document.querySelector('#page'), categories = ['All','Security','Reject','Update','Amazon','Payment'];
      page.innerHTML = '<input class="search" id="search" placeholder="Search mail"><div class="filters">' + categories.map(category => '<button data-category="' + category + '" class="' + (filter === category ? 'active' : '') + '">' + category + '</button>').join('') + '</div><div id="list" class="list"></div>';
      const input = document.querySelector('#search'); input.value = query; input.oninput = () => { query = input.value; paint(); };
      page.querySelectorAll('[data-category]').forEach(button => button.onclick = () => { filter = button.dataset.category; inbox(); });
      paint();
    }

    function paint() {
      const rows = data.messages.filter(message => (filter === 'All' || message.category === filter) && [message.account_name,message.subject,message.from_addr,message.snippet].join(' ').toLowerCase().includes(query.toLowerCase()));
      const list = document.querySelector('#list');
      list.innerHTML = rows.length ? rows.map((message, index) => '<button class="mail" data-index="' + index + '"><span class="icon ' + esc(message.category) + '">' + (message.category === 'Amazon' ? '<span class="amazon">amazon</span>' : (icons[message.category] || icons.General)) + '</span><span><span class="pill ' + esc(message.category) + '">' + esc(message.category) + '</span><div class="subject">' + esc(message.account_name) + ' | ' + esc(message.subject || '(No subject)') + '</div><div class="meta">' + esc(message.from_addr) + '</div></span><span class="right">' + (message.amount !== '' && message.amount != null ? '<div class="money">' + money(message) + '</div>' : '') + '<div class="meta">' + date(message.mail_date) + '</div></span></button>').join('') : '<div class="empty">No mail in the current sync range.</div>';
      list.querySelectorAll('[data-index]').forEach(button => button.onclick = () => openMail(rows[Number(button.dataset.index)]));
    }

    function openMail(message) {
      const modal = document.querySelector('#modal');
      const body = message.body_status === 'error' ? '[Body unavailable: ' + esc(message.body_error) + ']' : esc(message.body || '[No text body]');
      modal.innerHTML = '<section class="sheet"><button class="close">Close</button><h2>' + esc(message.subject) + '</h2><div class="meta">' + esc(message.account_name) + ' | ' + esc(message.from_addr) + ' | ' + date(message.mail_date) + '</div><hr><div>' + body + '</div></section>';
      modal.classList.add('open'); modal.querySelector('.close').onclick = () => modal.classList.remove('open');
    }

    function payments() {
      const totals = {};
      data.payments.forEach(payment => { if (payment.currency && payment.amount !== '' && payment.amount != null) totals[payment.currency] = (totals[payment.currency] || 0) + Number(payment.amount); });
      document.querySelector('#page').innerHTML = '<div>' + Object.entries(totals).map(([currency, amount]) => '<span class="sum">' + esc(currency) + ': ' + amount.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}) + '</span>').join('') + '</div>' + data.payments.map(payment => '<div class="payment"><span class="meta">' + date(payment.mail_date) + '</span><span><b>' + esc(payment.account_name) + '</b><div class="meta">' + esc(payment.account_email) + '</div><div class="meta">ID: ' + esc(payment.payment_id) + '</div></span><b class="money">' + money(payment) + '</b></div>').join('');
    }

    if (!api || !token) { root.innerHTML = '<div class="app empty">Dashboard link is not configured.</div>'; return; }
    fetch(api + '?action=snapshot&t=' + encodeURIComponent(token))
      .then(async response => {
        if (!response.ok) throw new Error('HTTP ' + response.status);
        return response.json();
      })
      .then(value => { data = value; shell(); })
      .catch(error => root.innerHTML = '<div class="app empty">Unable to load dashboard. ' + esc(error.message) + '</div>');
  })();
  </script>
</body>
</html>
