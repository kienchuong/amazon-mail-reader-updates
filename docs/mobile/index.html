    let data = {messages:[], payments:[], meta:{}}, tab = 'inbox', filter = 'All', query = '';
    const cfg = new URLSearchParams(location.hash.slice(1));
    const api = cfg.get('api'), token = cfg.get('t');
    const esc = value => String(value ?? '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
    const date = value => { const match = String(value || '').match(/^(\d{4})-(\d{2})-(\d{2})/); return match ? match[3] + '/' + match[2] : String(value || ''); };
    const money = row => row.amount === '' || row.amount == null ? '' : esc(row.currency) + ' ' + Number(row.amount).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});

    const accountCollator = new Intl.Collator(undefined, {numeric:true, sensitivity:'base'});
    const sortedPayments = () => [...data.payments].sort((left, right) => accountCollator.compare(String(left.account_name || ''), String(right.account_name || '')) || String(right.mail_date || '').localeCompare(String(left.mail_date || '')) || String(left.payment_id || '').localeCompare(String(right.payment_id || '')));

    function shell() {
      const meta = snapshotMeta();
      const sync = meta.synced_at ? new Date(meta.synced_at).toLocaleString() : 'No data';
      const rangeDays = meta.range_days || 7;
      root.innerHTML = '<div class="app"><div class="top"><div><div class="brand">Amazon Mail Reader<small>Mail overview</small></div><div class="sync">Synced ' + esc(sync) + ' | ' + esc(rangeDays) + ' days</div></div><div class="amazon">amazon</div></div><div id="page"></div></div><nav class="nav"><button id="inbox" class="' + (tab === 'inbox' ? 'active' : '') + '">Inbox</button><button id="payment" class="' + (tab === 'payment' ? 'active' : '') + '">Payments</button></nav><div id="modal" class="modal"></div>';

    function inbox() {

      const input = document.querySelector('#search'); input.value = query; input.oninput = () => { query = input.value; paint(); };

    function paint() {
      const rows = data.messages.filter(message => (filter === 'All' || message.category === filter) && [message.account_name,message.subject,message.from_addr,message.snippet].join(' ').toLowerCase().includes(query.toLowerCase()));
      const list = document.querySelector('#list');
      document.querySelector('#result-count').textContent = rows.length + ' mail';
      list.innerHTML = rows.length ? rows.map((message, index) => { const image = icons[String(message.category || '').toLowerCase()]; const art = image ? '<img class="mail-art" src="' + image + '" alt="' + esc(message.category) + '">' : '<span class="icon">@</span>'; return '<button class="mail" data-index="' + index + '">' + art + '<span><span class="pill ' + esc(message.category) + '">' + esc(message.category) + '</span><div class="subject">' + esc(message.account_name) + ' | ' + esc(message.subject || '(No subject)') + '</div><div class="meta">' + esc(message.from_addr) + '</div></span><span class="right">' + (message.amount !== '' && message.amount != null ? '<div class="money">' + money(message) + '</div>' : '') + '<div class="meta">' + date(message.mail_date) + '</div></span></button>'; }).join('') : '<div class="empty">No mail in the current sync range.</div>';

    function openMail(message) {

      const body = message.body_status === 'pending' ? '[Mail content is syncing. Please reopen in a moment.]' : (message.body_status === 'error' ? '[Body unavailable: ' + esc(message.body_error) + ']' : esc(message.body || '[No text body]'));
      modal.innerHTML = '<section class="sheet"><button class="close">Close</button><h2>' + esc(message.subject) + '</h2><div class="meta">' + esc(message.account_name) + ' | ' + esc(message.from_addr) + ' | ' + date(message.mail_date) + '</div><hr><div>' + body + '</div></section>';

    }

    function payments() {
      const rows = sortedPayments();
      const totals = {};
      rows.forEach(payment => { if (payment.currency && payment.amount !== '' && payment.amount != null) totals[payment.currency] = (totals[payment.currency] || 0) + Number(payment.amount); });
      document.querySelector('#page').innerHTML = '<div class="summary-label">Payment summary</div><div>' + Object.entries(totals).map(([currency, amount]) => '<span class="sum">' + esc(currency) + ': ' + amount.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}) + '</span>').join('') + '</div><div class="list-title"><span>Payments</span><span>' + rows.length + ' records</span></div>' + rows.map(payment => '<div class="payment"><span class="date">' + date(payment.mail_date) + '</span><span><div class="account">' + esc(payment.account_name) + '</div><div class="meta">' + esc(payment.account_email) + '</div><div class="meta">Payment ID ' + esc(payment.payment_id) + '</div></span><b class="amount">' + money(payment) + '</b></div>').join('');
    }

    if (!api || !token) { root.innerHTML = '<div class="app empty">Dashboard link is not configured.</div>'; return; }
    const loadSnapshot = (quiet = false) => fetch(api + '?action=snapshot&t=' + encodeURIComponent(token) + '&_=' + Date.now(), {cache:'no-store'})
      .then(async response => {
        if (!response.ok) throw new Error('HTTP ' + response.status);
        return response.json();
      })
      .then(value => {
        data = value;
        const sync = document.querySelector('.sync');
        if (!sync) shell();
        else {
          const meta = snapshotMeta();
          sync.textContent = 'Synced ' + (meta.synced_at ? new Date(meta.synced_at).toLocaleString() : 'No data') + ' | ' + (meta.range_days || 7) + ' days';
          tab === 'inbox' ? paint() : payments();
        }
      })
      .catch(error => { if (!quiet) root.innerHTML = '<div class="app empty">Unable to load dashboard. ' + esc(error.message) + '</div>'; });
    loadSnapshot();
    setInterval(() => loadSnapshot(true), 15000);
    document.addEventListener('visibilitychange', () => { if (!document.hidden) loadSnapshot(true); });
  })();
  </script>
</body>
</html>
